<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gill's Birthday Countdown</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mobile-container">
        <!-- Header Section -->
        <header class="header">
            <div class="profile-section">
                <div class="profile-image-container">
                    <img src="gill-photo.jpg" alt="Gill" class="profile-image">
                    <div class="image-ring"></div>
                </div>
                <h1 class="main-title">🇵🇭 Gill's Birthday 🎉</h1>
                <p class="subtitle">📅 May 8th</p>
            </div>
        </header>

        <!-- Countdown Section -->
        <main class="countdown-main">
            <div class="countdown-container">
                <div class="countdown-row">
                    <div class="countdown-card">
                        <div class="countdown-value" id="days">00</div>
                        <div class="countdown-label">📅 Days</div>
                    </div>
                    <div class="countdown-card">
                        <div class="countdown-value" id="hours">00</div>
                        <div class="countdown-label">⏰ Hours</div>
                    </div>
                </div>
                <div class="countdown-row">
                    <div class="countdown-card">
                        <div class="countdown-value" id="minutes">00</div>
                        <div class="countdown-label">⏱️ Minutes</div>
                    </div>
                    <div class="countdown-card">
                        <div class="countdown-value" id="seconds">00</div>
                        <div class="countdown-label">⚡ Seconds</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Floating Emojis -->
        <div class="floating-emojis">
            <div class="floating-emoji emoji-1">🇵🇭</div>
            <div class="floating-emoji emoji-2">🎉</div>
            <div class="floating-emoji emoji-3">🎂</div>
            <div class="floating-emoji emoji-4">🎈</div>
            <div class="floating-emoji emoji-5">🎁</div>
            <div class="floating-emoji emoji-6">⭐</div>
            <div class="floating-emoji emoji-7">💖</div>
            <div class="floating-emoji emoji-8">🎊</div>
            <div class="floating-emoji emoji-9">🎵</div>
            <div class="floating-emoji emoji-10">🎭</div>

            <div class="floating-emoji emoji-13">🎯</div>
            <div class="floating-emoji emoji-14">🎲</div>
            <div class="floating-emoji emoji-15">🎮</div>
            <!-- Additional Filipino Flag Emojis -->
            <div class="floating-emoji emoji-16">🇵🇭</div>

            <div class="floating-emoji emoji-25">🇵🇭</div>
            <!-- Extra mobile emojis -->
            <div class="floating-emoji emoji-26">🇵🇭</div>
            <div class="floating-emoji emoji-27">🎉</div>
            <div class="floating-emoji emoji-28">🇵🇭</div>
